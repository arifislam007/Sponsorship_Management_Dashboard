version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: sombhabona-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sombhabona-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      API_PREFIX: /api/v1
      PORT: 8000
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    # ports:
    #   - "8000:8000"

  ict-backend:
    build:
      context: ./ict-backend
      dockerfile: Dockerfile
    container_name: sombhabona-ict
    restart: unless-stopped
    environment:
      DB_HOST: sombhabona-db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here}
      PORT: 5002
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      db:
        condition: service_healthy
    # ports:
    #   - "5002:5002"

  project-backend:
    build:
      context: ./project-backend
      dockerfile: Dockerfile
    container_name: sombhabona-projects
    restart: unless-stopped
    environment:
      DB_HOST: sombhabona-db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here}
      PORT: 5003
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5003/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    # ports:
    #   - "5003:5003"

  hr-backend:
    build:
      context: ./hr-backend
      dockerfile: Dockerfile
    container_name: sombhabona-hr
    restart: unless-stopped
    environment:
      DB_HOST: sombhabona-db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      PORT: 5004
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5004/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    # ports:
    #   - "5004:5004"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sombhabona-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "6080:80"

volumes:
  postgres_data:
  backend_uploads:
